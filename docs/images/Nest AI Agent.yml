    - data:
        code: "import math\n\ndef equirectangular_distance(lat1, lon1, lat2, lon2,\
          \ radius=6371):\n    \"\"\"\n    Calculate the approximate distance between\
          \ two points on Earth using \n    the Equirectangular Approximation (fast\
          \ but only accurate for small distances).\n    \n    Args:\n        lat1\
          \ (float): Latitude of first point in decimal degrees\n        lon1 (float):\
          \ Longitude of first point in decimal degrees\n        lat2 (float): Latitude\
          \ of second point in decimal degrees\n        lon2 (float): Longitude of\
          \ second point in decimal degrees\n        radius (float): Earth's radius\
          \ in km (default: 6371 km)\n                       Use 3959 for miles\n\
          \    \n    Returns:\n        float: Approximate distance in the same units\
          \ as radius (km or miles)\n    \n    Note:\n        This method is suitable\
          \ for small distances (< 100 km typically).\n        For larger distances\
          \ or higher accuracy, use the Haversine formula.\n    \"\"\"\n    # Convert\
          \ degrees to radians\n    lat1_rad = math.radians(lat1)\n    lat2_rad =\
          \ math.radians(lat2)\n    lon1_rad = math.radians(lon1)\n    lon2_rad =\
          \ math.radians(lon2)\n    \n    # Calculate differences\n    delta_lon =\
          \ lon2_rad - lon1_rad\n    delta_lat = lat2_rad - lat1_rad\n    \n    #\
          \ Equirectangular approximation\n    # Average latitude for the cosine correction\n\
          \    avg_lat = (lat1_rad + lat2_rad) / 2\n    \n    # Calculate x and y\
          \ distances\n    x = delta_lon * math.cos(avg_lat)\n    y = delta_lat\n\
          \    \n    # Calculate Euclidean distance\n    distance = radius * math.sqrt(x**2\
          \ + y**2)\n    \n    return distance\n\n\ndef main(data, _property, latitude,\
          \ longitude):\n    \"\"\"\n    Calculate distances from a reference point\
          \ to all amenities in data,\n    add distance to each amenity, sort by distance,\
          \ and attach to property.\n    \n    Args:\n        data (list): List of\
          \ amenity objects with 'latitude' and 'longitude' keys\n        _property\
          \ (dict): Property object to attach amenities to\n        latitude (float):\
          \ Reference latitude\n        longitude (float): Reference longitude\n \
          \   \n    Returns:\n        dict: Updated property object with sorted amenities\n\
          \    \"\"\"\n    # Calculate distance for each amenity\n    amenities_with_distance\
          \ = []\n    \n    for amenity in data:\n        # Calculate distance from\
          \ reference point to this amenity\n        if not amenity.get('lat') or\
          \ not amenity.get('lon'):\n            continue\n\n        distance = equirectangular_distance(\n\
          \            latitude, \n            longitude,\n            amenity['lat'],\n\
          \            amenity['lon']\n        )\n        \n        # Create a copy\
          \ of the amenity with distance added\n        amenity_with_distance = {**amenity,\
          \ 'distance': distance}\n        amenities_with_distance.append(amenity_with_distance)\n\
          \    \n    # Sort amenities by distance (closest first)\n    sorted_amenities\
          \ = sorted(amenities_with_distance, key=lambda x: x['distance'])\n    \n\
          \    # Add sorted amenities to the property object\n    _property['amenities']\
          \ = sorted_amenities\n    \n    return {\n        \"result\": _property\n\
          \    }"
        code_language: python3

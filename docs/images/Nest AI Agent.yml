    - data:
        code: "import json\n\ndef main(api_response) -> dict:\n    \"\"\"Format Stream\
          \ Estate API response into simplified property list\"\"\"\n    \n    # Parse\
          \ JSON if response is a string\n    if isinstance(api_response, str):\n\
          \        api_response = json.loads(api_response)\n    \n    # Extract properties\
          \ from API response\n    properties = api_response.get('hydra:member', [])\n\
          \    \n    # Format each property\n    formatted_properties = []\n    for\
          \ prop in properties:\n        city = prop.get('city', {})\n        location\
          \ = city.get('location', {})\n        advert = prop.get('adverts', [{}])[0]\
          \ if prop.get('adverts') else {}\n        \n        formatted_properties.append({\n\
          \            \"title\": prop.get('title'),\n            \"price\": prop.get('price'),\n\
          \            \"surface\": prop.get('surface'),\n            \"bedrooms\"\
          : prop.get('bedroom'),\n            \"city\": city.get('name'),\n      \
          \      \"latitude\": location.get('lat'),\n            \"longitude\": location.get('lon'),\n\
          \            \"description\": advert.get('description'),\n            \"\
          images\": advert.get('pictures', []),\n            \"url\": advert.get('url',\
          \ '')\n        })\n    \n    return {\"result\": formatted_properties}"
